apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
spec:
  replicas: 4
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: 192.168.100.13:5000/flask:latest
---
apiVersion: v1
kind: Service
metadata:
  name: flask
spec:
  selector:
    app: flask
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort